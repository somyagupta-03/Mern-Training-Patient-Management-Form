<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Registry</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <header>Patient Registration Form</header>
    <form action="/register" method="POST">
        <label for="name">Full Name:</label><br>
        <input type="text" id="name" name="name" required><br><br>
        <label for="date">Date of Admission:</label><br>
        <input type="date" id="date" name="date" required><br><br>
        <label for="disease">Disease Name:</label><br>
        <input type="text" id="disease" name="disease" required><br><br>
        <button type ="submit">Register Patient</button>
    </form>
    <br>
    <a href="/patients">View Registered Patients</a>
</div>
</body>
</html>
